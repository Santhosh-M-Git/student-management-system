<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Panel | SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #a18cd1;
            --purple-dim: rgba(161,140,209,0.1);
            --cyan: #74ebd5;
            --bg: #08060f;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(161,140,209,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(161,140,209,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container { max-width: 1100px; margin: auto; position: relative; z-index: 1; }

        /* ---- HEADER ---- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .t-avatar {
            width: 46px; height: 46px;
            border-radius: 14px;
            background: linear-gradient(135deg, #a18cd1, #7b2ff7);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, var(--purple), #fbc2eb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-top: 2px;
        }

        .logout-btn {
            padding: 9px 18px;
            background: rgba(255,68,68,0.08);
            border: 1px solid rgba(255,68,68,0.2);
            border-radius: 10px;
            color: #ff6b6b;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: rgba(255,68,68,0.16); }

        /* ---- STATS ---- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }
        .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--cyan), var(--purple)); }
        .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--purple), #fbc2eb); }

        .stat-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 8px; }
        .stat-value { font-size: 30px; font-weight: 700; letter-spacing: -1px; }

        /* ---- MAIN LAYOUT ---- */
        .main-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
            gap: 18px;
            margin-bottom: 20px;
        }

        .action-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            transition: border-color 0.3s;
        }
        .action-card:hover { border-color: rgba(161,140,209,0.25); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card-icon {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: var(--purple-dim);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }

        .action-card h2 {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        /* Fields */
        .field { margin-bottom: 14px; }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.38);
            margin-bottom: 7px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
            appearance: none;
        }

        input::placeholder { color: rgba(255,255,255,0.22); }

        input:focus, select:focus {
            background: rgba(161,140,209,0.07);
            border-color: rgba(161,140,209,0.4);
            box-shadow: 0 0 0 3px rgba(161,140,209,0.08);
        }

        select option { background: #1a1528; color: white; }

        .submit-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--purple), #7b2ff7);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            margin-top: 6px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,47,247,0.4); }
        .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Students list */
        .students-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .students-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .students-header h2 {
            font-size: 17px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
        }

        .student-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .student-table th {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.3);
            border-bottom: 1px solid var(--border);
        }
        .student-table td {
            padding: 11px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.75);
        }
        .student-table tr:last-child td { border-bottom: none; }
        .student-table tr:hover td { background: rgba(255,255,255,0.02); }

        .student-id-badge {
            display: inline-block;
            background: rgba(161,140,209,0.12);
            color: var(--purple);
            font-weight: 700;
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 100px;
        }

        /* Activity log */
        .log-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
        }

        .log-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .log-item {
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-left: 2px solid var(--purple);
            border-radius: 0 10px 10px 0;
            margin-bottom: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        .log-time { color: rgba(161,140,209,0.7); font-size: 11px; margin-right: 8px; }

        #logList p { font-size: 13px; color: rgba(255,255,255,0.25); text-align: center; padding: 8px 0; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            padding: 14px 22px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            display: none;
            max-width: 340px;
            animation: toastIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(16px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .toast.success { background: #0a2e1f; border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
        .toast.error   { background: #2e0a0a; border: 1px solid rgba(255,68,68,0.3); color: #ff6b6b; }

        .no-data { font-size: 13px; color: rgba(255,255,255,0.3); text-align: center; padding: 12px 0; }
    </style>

<style>

body.light-mode .welcome-text h1 { color: #111 !important; }

</style>
</head>
<body>
<!-- ═══ THEME WIDGET (inject in <body>) ═══ -->
<div id="themeWidget" style="position:fixed;top:16px;right:16px;z-index:99999;display:flex;align-items:center;gap:8px;">
    <!-- Mode Toggle -->
    <button id="modeToggleBtn" onclick="toggleMode()" title="Toggle Dark/Light"
        style="width:40px;height:40px;border-radius:12px;border:1px solid var(--border-color,rgba(255,255,255,0.15));background:var(--card-bg,rgba(255,255,255,0.06));color:var(--text-color,#fff);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(10px);">
        🌙
    </button>
    <!-- Color Picker Toggle -->
    <button onclick="togglePicker()" title="Change colour theme"
        style="width:40px;height:40px;border-radius:12px;border:1px solid var(--border-color,rgba(255,255,255,0.15));background:var(--card-bg,rgba(255,255,255,0.06));color:var(--text-color,#fff);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;backdrop-filter:blur(10px);">
        🎨
    </button>
    <!-- Color Picker Panel -->
    <div id="colorPicker" style="display:none;background:var(--card-bg,rgba(20,20,30,0.95));border:1px solid var(--border-color,rgba(255,255,255,0.15));border-radius:16px;padding:14px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.4);">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted,rgba(255,255,255,0.45));margin-bottom:10px;">Colour Theme</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;max-width:170px;">
            <div onclick="setColor('green')"  title="Emerald" style="width:28px;height:28px;border-radius:8px;background:#00ff88;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>
            <div onclick="setColor('purple')" title="Purple"  style="width:28px;height:28px;border-radius:8px;background:#a18cd1;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>
            <div onclick="setColor('blue')"   title="Ocean"   style="width:28px;height:28px;border-radius:8px;background:#00d2ff;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>
            <div onclick="setColor('gold')"   title="Gold"    style="width:28px;height:28px;border-radius:8px;background:#f5c842;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>
            <div onclick="setColor('rose')"   title="Rose"    style="width:28px;height:28px;border-radius:8px;background:#ff6b9d;cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>
        </div>
    </div>
</div>

<!-- ═══ THEME ENGINE SCRIPT ═══ -->
<script>
const THEMES = {
    green:  { primary:'#00ff88', secondary:'#00d2ff', darkBg:'linear-gradient(135deg,#020f0a,#00332e)', lightBg:'#efffef', cardDark:'rgba(0,255,136,0.04)', cardLight:'rgba(0,180,80,0.06)', borderDark:'rgba(0,255,136,0.15)', borderLight:'rgba(0,180,80,0.2)' },
    purple: { primary:'#a18cd1', secondary:'#fbc2eb', darkBg:'linear-gradient(135deg,#08060f,#1a0f2e)', lightBg:'#f5f0ff', cardDark:'rgba(161,140,209,0.05)', cardLight:'rgba(120,80,200,0.06)', borderDark:'rgba(161,140,209,0.18)', borderLight:'rgba(120,80,200,0.2)' },
    blue:   { primary:'#00d2ff', secondary:'#3a7bd5', darkBg:'linear-gradient(135deg,#020a14,#0a1628)', lightBg:'#eef8ff', cardDark:'rgba(0,210,255,0.04)', cardLight:'rgba(0,150,220,0.06)', borderDark:'rgba(0,210,255,0.15)', borderLight:'rgba(0,150,220,0.2)' },
    gold:   { primary:'#f5c842', secondary:'#ff9500', darkBg:'linear-gradient(135deg,#0a0800,#1a1000)', lightBg:'#fffbee', cardDark:'rgba(245,200,66,0.04)', cardLight:'rgba(200,150,0,0.06)', borderDark:'rgba(245,200,66,0.15)', borderLight:'rgba(200,150,0,0.2)' },
    rose:   { primary:'#ff6b9d', secondary:'#ff4757', darkBg:'linear-gradient(135deg,#0f0608,#1a0810)', lightBg:'#fff0f4', cardDark:'rgba(255,107,157,0.04)', cardLight:'rgba(220,60,100,0.06)', borderDark:'rgba(255,107,157,0.15)', borderLight:'rgba(220,60,100,0.2)' },
};

let currentColor = localStorage.getItem('sms_color') || 'green';
let currentMode  = localStorage.getItem('sms_mode')  || 'dark';

function applyTheme(color, mode) {
    const t = THEMES[color] || THEMES.green;
    const isLight = mode === 'light';

    document.documentElement.style.setProperty('--primary', t.primary);
    document.documentElement.style.setProperty('--secondary', t.secondary);

    if (isLight) {
        document.body.style.background = t.lightBg;
        document.body.style.color = '#111';
        document.documentElement.style.setProperty('--card-bg', t.cardLight);
        document.documentElement.style.setProperty('--border-color', t.borderLight);
        document.documentElement.style.setProperty('--text-color', '#111');
        document.documentElement.style.setProperty('--text-muted', 'rgba(0,0,0,0.5)');
        document.documentElement.style.setProperty('--input-bg', 'rgba(0,0,0,0.05)');
        document.documentElement.style.setProperty('--input-border', 'rgba(0,0,0,0.15)');
        document.body.classList.add('light-mode');
        const btn = document.getElementById('modeToggleBtn');
        if (btn) btn.innerText = '☀️';
    } else {
        document.body.style.background = t.darkBg;
        document.body.style.color = '#fff';
        document.documentElement.style.setProperty('--card-bg', t.cardDark);
        document.documentElement.style.setProperty('--border-color', t.borderDark);
        document.documentElement.style.setProperty('--text-color', '#fff');
        document.documentElement.style.setProperty('--text-muted', 'rgba(255,255,255,0.45)');
        document.documentElement.style.setProperty('--input-bg', 'rgba(255,255,255,0.06)');
        document.documentElement.style.setProperty('--input-border', 'rgba(255,255,255,0.1)');
        document.body.classList.remove('light-mode');
        const btn = document.getElementById('modeToggleBtn');
        if (btn) btn.innerText = '🌙';
    }

    // Update all cards, borders, inputs dynamically
    document.querySelectorAll('.login-box, .card, .action-card, .dashboard-section, .stat-card, .stat-box, .recent-log, .log-section, .students-section').forEach(el => {
        el.style.background = isLight ? t.cardLight : t.cardDark;
        el.style.borderColor = isLight ? t.borderLight : t.borderDark;
        el.style.color = isLight ? '#111' : '#fff';
    });

    document.querySelectorAll('input, select').forEach(el => {
        el.style.background = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.06)';
        el.style.borderColor = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)';
        el.style.color = isLight ? '#111' : '#fff';
    });

    document.querySelectorAll('table th').forEach(el => { el.style.color = isLight ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.3)'; });
    document.querySelectorAll('table td').forEach(el => { el.style.color = isLight ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.75)'; });

    localStorage.setItem('sms_color', color);
    localStorage.setItem('sms_mode', mode);
    currentColor = color;
    currentMode = mode;
}

function toggleMode() {
    currentMode = currentMode === 'dark' ? 'light' : 'dark';
    applyTheme(currentColor, currentMode);
}

function setColor(color) {
    applyTheme(color, currentMode);
    document.getElementById('colorPicker').style.display = 'none';
}

function togglePicker() {
    const picker = document.getElementById('colorPicker');
    picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
}

// Close picker on outside click
document.addEventListener('click', function(e) {
    const widget = document.getElementById('themeWidget');
    if (widget && !widget.contains(e.target)) {
        const picker = document.getElementById('colorPicker');
        if (picker) picker.style.display = 'none';
    }
});

// Apply saved theme on load
applyTheme(currentColor, currentMode);
</script>


    <div class="toast" id="toast"></div>

                <div class="field">
                    <label>Date</label>
                    <input type="date" id="attDate">
                </div>
                <div class="field">
                    <label>Status</label>
                    <select id="attStatus">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                    </select>
                </div>
                <button class="submit-btn" onclick="submitAttendance()" id="attBtn">Push Attendance</button>
            </div>

            <div class="action-card">
                <div class="card-header">
                    <div class="card-icon">📝</div>
                    <h2>Update Academics</h2>
                </div>

                <div class="field">
                    <label>Student ID</label>
                    <input type="number" id="marksStudentId" placeholder="e.g. 1, 2, 3...">
                </div>
                <div class="field">
                    <label>Subject Name</label>
                    <input type="text" id="subject" placeholder="e.g. Tamil, English, Maths...">
                </div>
                <div class="field">
                    <label>Score (0 — 100)</label>
                    <input type="number" id="score" placeholder="Enter marks" min="0" max="100">
                </div>
                <button class="submit-btn" onclick="submitMarks()" id="marksBtn">Publish Marks</button>
            </div>
        </div>

        <!-- ACTIVITY LOG -->
        <div class="log-section">
            <h3>📋 Recent Activity</h3>
            <div id="logList">
                <p>No entries yet.</p>
            </div>
        </div>

    </div>

    <script>
        const BASE_URL = "http://localhost:6060";
        let sessionCount = 0;

        document.getElementById('attDate').valueAsDate = new Date();

        async function loadStudents() {
            try {
                const res = await fetch(BASE_URL + "/students");
                const students = await res.json();
                document.getElementById('totalStudents').innerText = students.length;

                if (students.length === 0) {
                    document.getElementById('studentList').innerHTML = '<p class="no-data">No students enrolled yet.</p>';
                    return;
                }

                let html = '<table class="student-table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th></tr></thead><tbody>';
                students.forEach(s => {
                    html += `<tr>
                        <td><span class="student-id-badge">#${s.id}</span></td>
                        <td style="font-weight:600;color:rgba(255,255,255,0.88)">${s.name}</td>
                        <td style="color:rgba(255,255,255,0.5)">${s.email}</td>
                        <td style="color:rgba(255,255,255,0.5)">${s.phone || '-'}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('studentList').innerHTML = html;
            } catch (e) {
                document.getElementById('totalStudents').innerText = '?';
                document.getElementById('studentList').innerHTML = '<p class="no-data">Could not load student list.</p>';
            }
        }

        loadStudents();

        async function submitAttendance() {
            const studentId = document.getElementById('attStudentId').value.trim();
            const date = document.getElementById('attDate').value;
            const status = document.getElementById('attStatus').value;

            if (!studentId || !date) { showToast("Please fill Student ID and Date!", "error"); return; }

            const btn = document.getElementById('attBtn');
            btn.disabled = true;
            btn.innerText = "Saving...";

            try {
                const res = await fetch(BASE_URL + "/attendance", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ studentId: parseInt(studentId), attendanceDate: date, status })
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(errText);
                }

                showToast("Attendance saved! Student " + studentId + " → " + status, "success");
                addLog("Attendance | Student #" + studentId + " | " + status + " | " + date);
                sessionCount++;
                document.getElementById('sessionCount').innerText = sessionCount;
                document.getElementById('attStudentId').value = '';

            } catch (err) {
                const msg = err.message.includes("already marked")
                    ? "Attendance already marked for this student on this date!"
                    : "Failed to save. Check Student ID & server.";
                showToast(msg, "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Push Attendance";
            }
        }

        async function submitMarks() {
            const studentId = document.getElementById('marksStudentId').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const score = document.getElementById('score').value.trim();

            if (!studentId || !subject || score === '') { showToast("Please fill all fields!", "error"); return; }
            if (parseInt(score) < 0 || parseInt(score) > 100) { showToast("Score must be 0 - 100!", "error"); return; }

            const btn = document.getElementById('marksBtn');
            btn.disabled = true;
            btn.innerText = "Saving...";

            try {
                const res = await fetch(BASE_URL + "/marks", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ studentId: parseInt(studentId), subject, marks: parseInt(score) })
                });

                if (!res.ok) throw new Error("HTTP " + res.status);

                showToast(subject + ": " + score + "/100 saved for Student #" + studentId, "success");
                addLog("Marks | Student #" + studentId + " | " + subject + ": " + score + "/100");
                sessionCount++;
                document.getElementById('sessionCount').innerText = sessionCount;
                document.getElementById('marksStudentId').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('score').value = '';

            } catch (err) {
                showToast("Failed to save marks. Check Student ID & server.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish Marks";
            }
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.className = "toast " + type;
            t.innerText = (type === 'success' ? '✓  ' : '✕  ') + msg;
            t.style.display = "block";
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.display = "none"; }, 3800);
        }

        function addLog(msg) {
            const list = document.getElementById('logList');
            const p = list.querySelector('p');
            if (p) p.remove();
            const div = document.createElement('div');
            div.className = 'log-item';
            const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            div.innerHTML = '<span class="log-time">' + now + '</span>' + msg;
            list.insertBefore(div, list.firstChild);
            const items = list.querySelectorAll('.log-item');
            if (items.length > 10) items[items.length - 1].remove();
        }
    </script>
</body>
</html>
